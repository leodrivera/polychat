name: Release

on:
  push:
    branches:
      - main
    paths:
      - pyproject.toml

permissions:
  contents: write

jobs:
  tag-and-release:
    name: Tag and Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from pyproject.toml
        id: version
        run: |
          version=$(grep '^version' pyproject.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate changelog from commits
        if: steps.tag_check.outputs.exists == 'false'
        id: changelog
        run: |
          previous_tag=$(git tag --sort=-version:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -1)
          if [ -n "$previous_tag" ]; then
            notes=$(git log "${previous_tag}..HEAD" --pretty=format:"- %s" --no-merges)
            range="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${previous_tag}...${{ steps.version.outputs.tag }}"
          else
            notes=$(git log --pretty=format:"- %s" --no-merges)
            range=""
          fi
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo "$notes"
            [ -n "$range" ] && echo "" && echo "$range"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ steps.version.outputs.tag }}"
          name: "${{ steps.version.outputs.tag }}"
          body: "${{ steps.changelog.outputs.notes }}"

      - name: Trigger Docker publish
        if: steps.tag_check.outputs.exists == 'false'
        run: gh workflow run docker-publish.yml --ref "${{ steps.version.outputs.tag }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
