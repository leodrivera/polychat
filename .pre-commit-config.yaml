repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright (strict types)
        entry: uv run pyright
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: pytest-fast
        name: pytest (unit only, no network)
        entry: uv run pytest -m "not integration"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
